<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petlor - Upload Lab Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #589A64;
            --bg-light: #F8FAF8;
            --sidebar-width: 240px;
            --text-dark: #1A1A1A;
            --text-gray: #666;
            --border-color: #E0E0E0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); display: flex; height: 100vh; overflow: hidden; color: var(--text-dark); }

        /* --- Sidebar --- */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
            flex-shrink: 0;
            justify-content: space-between;
        }

        .sidebar-logo {
            padding: 0 1.5rem 2rem;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-item.active {
            background-color: var(--primary-green);
            color: white;
            margin: 0 10px;
            border-radius: 8px;
        }

        /* --- Main Content --- */
        .main-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }

        header {
            background: white;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .user-profile { display: flex; align-items: center; gap: 15px; font-size: 0.85rem; }
        .avatar { width: 35px; height: 35px; background: var(--primary-green); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* --- Upload Form Page --- */
        .content-padding { padding: 2rem; max-width: 850px; margin: 0 auto; width: 100%; }
        
        .back-link { 
            text-decoration: none; 
            color: var(--text-gray); 
            font-size: 0.85rem; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 1.5rem;
        }

        .page-title { font-size: 1.8rem; margin-bottom: 2rem; }

        .form-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 1.5rem; }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-weight: 600; font-size: 0.9rem; }
        
        input, select, textarea {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        /* Upload Area */
        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 2rem;
        }
        .upload-zone:hover { border-color: var(--primary-green); background: #f9fdfa; }
        .upload-zone i { font-size: 2rem; color: var(--primary-green); margin-bottom: 10px; }
        .upload-zone p { font-size: 0.9rem; color: var(--text-gray); }
        .upload-zone span { font-weight: 600; color: var(--primary-green); }

        .action-btns { display: flex; gap: 12px; justify-content: flex-end; }
        
        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
        }
        .btn-cancel { background: #f5f5f5; color: var(--text-gray); }
        .btn-submit { background: var(--primary-green); color: white; }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div>
            <div class="sidebar-logo">
                <i class="fa-solid fa-paw"></i> 
                <div>Petlor <br></div>
            </div>
            <a href="vetDashboard.html" class="nav-item"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="createprescription.html" class="nav-item"><i class="fa-regular fa-file-lines"></i> New Prescription</a>
            <a href="labresults.html" class="nav-item active"><i class="fa-solid fa-flask"></i> Lab Results</a>
            <a href="medicalnotes.html" class="nav-item"><i class="fa-regular fa-pen-to-square"></i> Medical Notes</a>
            <a href="diseasealert.html" class="nav-item"><i class="fa-solid fa-bullhorn"></i> Disease Alerts</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <div style="color: #666; font-size: 0.8rem;">Lab Results / <strong>Upload Result</strong></div>
            <div class="user-profile">
                <div class="avatar">DM</div>
                <div><strong>Dr. Mark Lee</strong><br><span style="font-size: 0.75rem; color: #999;">vet@petlor.com</span></div>
            </div>
        </header>

        <div class="content-padding">
            <a href="#" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Lab Results</a>
            
            <h1 class="page-title">Upload Lab Result</h1>

            <div class="form-card">
                <div class="form-row">
                    <div class="form-group">
                        <label>Select Patient</label>
                        <select>
                            <option>Max (Golden Retriever)</option>
                            <option>Luna (British Shorthair)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Test Name</label>
                        <input type="text" placeholder="e.g. Complete Blood Count">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Test Date</label>
                        <input type="date">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select>
                            <option>Normal</option>
                            <option>Abnormal</option>
                            <option>Critical</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Result Summary</label>
                    <textarea rows="3" placeholder="Enter a brief summary of the findings..."></textarea>
                </div>

                <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 8px;">Laboratory Report (PDF or Image)</label>
                <div class="upload-zone">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p><span>Click to upload</span> or drag and drop</p>
                    <p style="font-size: 0.75rem; margin-top: 5px;">PDF, PNG, JPG (max. 10MB)</p>
                </div>

                <div class="action-btns">
                    <button class="btn btn-cancel">Cancel</button>
                    <button class="btn btn-submit">Upload Result</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
